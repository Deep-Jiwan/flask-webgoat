name: DAST Security Scan (Authenticated)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

jobs:
  dast-scan:
    name: Run DAST Analysis with ZAP (Authenticated)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Flask>=2.0,<3.0" "Werkzeug>=2.0,<3.0" "Jinja2>=3.0" "itsdangerous>=2.0" "click>=8.0"

      - name: Start Flask application
        run: |
          nohup python run.py > app.log 2>&1 &
          echo $! > app.pid
          echo "Waiting for Flask app to start..."
          for i in {1..30}; do
            if curl -sf http://localhost:5000/status > /dev/null 2>&1; then
              echo "Flask app is up on localhost:5000"
              exit 0
            fi
            echo "Attempt $i/30: not ready yet..."
            sleep 2
          done
          echo "Flask app failed to start"
          cat app.log
          exit 1

      - name: Verify admin credentials work
        run: |
          # Confirm admin/admin login succeeds before handing off to ZAP
          RESPONSE=$(curl -s -X POST http://localhost:5000/login \
            -d "username=admin&password=admin" \
            -H "Content-Type: application/x-www-form-urlencoded")
          echo "Login response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success"' && echo "Admin login OK" || echo "WARNING: login check failed"

      - name: Run OWASP ZAP (Automation Framework - Authenticated)
        run: |
          # Mount GITHUB_WORKSPACE as /zap/wrk so ZAP can read .zap/af-plan.yaml
          # and write the report directly to the workspace.
          # --network=host lets ZAP reach localhost:5000 (the Flask app).
          docker run --name zap-scan \
            --network=host \
            --user root \
            -v "${GITHUB_WORKSPACE}:/zap/wrk:rw" \
            zaproxy/zap-stable zap.sh -cmd \
            -autorun /zap/wrk/.zap/af-plan.yaml \
            -config api.disabledkey=true
        continue-on-error: true

      - name: Save DAST results
        run: |
          mkdir -p results_files/dasts
          BRANCH_NAME="${{ github.ref_name }}"
          rm -f results_files/dasts/${BRANCH_NAME}_dast.json
          if [ -f full-scan-report.json ]; then
            cp full-scan-report.json results_files/dasts/${BRANCH_NAME}_dast.json
            echo "DAST JSON saved ($(wc -c < full-scan-report.json) bytes)"
          else
            echo "WARNING: full-scan-report.json not found"
            ls -lh . || true
          fi

      - name: Commit DAST results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results_files/
          git commit -m "Add DAST results (authenticated) for ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }} || echo "No remote changes"
          git push || echo "Nothing to push"

      - name: Stop Flask application
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) 2>/dev/null || true
            sleep 2
            kill -9 $(cat app.pid) 2>/dev/null || true
            rm app.pid
          fi

      - name: Upload DAST artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-results-authenticated
          path: |
            full-scan-report.json
          retention-days: 30

      - name: Scan summary
        if: always()
        run: |
          echo "## DAST Scan Complete (Authenticated)" >> $GITHUB_STEP_SUMMARY
          echo "**Tool:** OWASP ZAP Automation Framework" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** Form-based auth (admin/admin) + endpoint seeding" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** http://localhost:5000/" >> $GITHUB_STEP_SUMMARY
          echo "**Attack Strength:** HIGH | **Threshold:** LOW" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          if [ -f full-scan-report.json ]; then
            HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' full-scan-report.json 2>/dev/null || echo "0")
            MED=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' full-scan-report.json 2>/dev/null || echo "0")
            LOW=$(jq '[.site[].alerts[] | select(.riskcode == "1")] | length' full-scan-report.json 2>/dev/null || echo "0")
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            echo "| High | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| Medium | $MED |" >> $GITHUB_STEP_SUMMARY
            echo "| Low | $LOW |" >> $GITHUB_STEP_SUMMARY
          fi
